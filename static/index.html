<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gemmy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f7f5;
    --surface:   #ffffff;
    --border:    #e8e8e4;
    --accent:    #0050ff;
    --accent-lt: #e8eeff;
    --success:   #00875a;
    --success-lt:#e6f4ef;
    --text:      #111111;
    --muted:     #888884;
    --bot-bg:    #ffffff;
    --user-bg:   #0050ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── header ── */
  header {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 16px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  header h1 {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .live-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--success);
    font-family: 'DM Mono', monospace;
    background: var(--success-lt);
    padding: 3px 8px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 5px; height: 5px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── chat window ── */
  .chat-window {
    width: 100%;
    max-width: 680px;
    height: 500px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 3px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── messages ── */
  .msg {
    display: flex;
    gap: 9px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  .msg.bot  .avatar { background: var(--accent-lt); color: var(--accent); }
  .msg.user .avatar { background: #dde6ff; color: var(--accent); }

  .bubble {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
  }

  .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 3px; }
  .msg.user .bubble { background: var(--user-bg); color: #fff; border-top-right-radius: 3px; }

  /* ── trade card ── */
  .trade-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .trade-card .card-title {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .trade-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .trade-row:last-child { border-bottom: none; }

  .trade-row .label { color: var(--muted); font-size: 11px; }
  .trade-row .value { color: var(--text); font-size: 12px; font-weight: 500; }
  .trade-row .value.green { color: var(--success); }
  .trade-row .value.blue  { color: var(--accent); }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .btn {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-confirm { background: var(--accent); color: #fff; }
  .btn-cancel  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── typing indicator ── */
  .typing .bubble {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }

  .typing .dot-t {
    width: 5px; height: 5px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing .dot-t:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot-t:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-4px); }
  }

  /* ── input bar ── */
  .input-bar {
    width: 100%;
    max-width: 680px;
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .input-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.15s;
  }

  .input-bar input::placeholder { color: var(--muted); }
  .input-bar input:focus { border-color: var(--accent); }

  .input-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .input-bar button:hover    { opacity: 0.88; }
  .input-bar button:disabled { opacity: 0.35; cursor: not-allowed; }

  .hint {
    width: 100%;
    max-width: 680px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
  }

  /* ── portfolio panel ── */
  .portfolio {
    width: 100%;
    max-width: 680px;
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    overflow: hidden;
  }

  .portfolio-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .portfolio-header span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .portfolio-header .count {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
  }

  .portfolio-empty {
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .position-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    gap: 12px;
  }
  .position-row:last-child { border-bottom: none; }

  .position-left { flex: 1; min-width: 0; }

  .position-event {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
  }

  .position-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .position-right {
    text-align: right;
    flex-shrink: 0;
  }

  .position-payout {
    font-weight: 500;
    color: var(--success);
    font-size: 12px;
  }

  .position-cost {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 4px;
  }

  .pill-yes { background: var(--accent-lt); color: var(--accent); }
  .pill-no  { background: #fff0f0; color: #cc3333; }
</style>
</head>
<body>

<header>
  <img src="/static/gemini-logo.png" alt="Gemini" style="height:30px; width:30px;" />
  <h1>Gemmy</h1>
  <div class="live-badge"><span class="dot"></span>live</div>
</header>

<div class="chat-window" id="chat"></div>

<div class="input-bar">
  <input id="input" type="text" placeholder="e.g. I think Kansas wins the NCAA tonight, bet $50" />
  <button id="sendBtn" onclick="sendMessage()">Send →</button>
</div>

<div class="hint">Natural language → prediction market orders · Gemmy by Gemini</div>

<div class="portfolio">
  <div class="portfolio-header">
    <span>My Positions</span>
    <span class="count" id="pos-count">0 open</span>
  </div>
  <div id="portfolio-body">
    <div class="portfolio-empty">No positions yet — place a trade to get started.</div>
  </div>
</div>

<script>
const chat    = document.getElementById('chat');
const input   = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

let pendingDetails = null;

// ── boot message ────────────────────────────────────────────────────────────
window.onload = () => {
  appendBot("Hey! I'm Gemmy, your prediction market assistant. Tell me what you want to bet on and how much — I'll find the best contract and walk you through it.");
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  fetchPortfolio();
  setInterval(fetchPortfolio, 10000);
};

// ── portfolio ─────────────────────────────────────────────────────────────────
async function fetchPortfolio() {
  try {
    const res  = await fetch('/api/portfolio');
    const data = await res.json();
    if (data.ok) renderPortfolio(data.positions);
  } catch(e) { /* silent */ }
}

function renderPortfolio(positions) {
  const body  = document.getElementById('portfolio-body');
  const count = document.getElementById('pos-count');
  count.textContent = `${positions.length} open`;

  if (positions.length === 0) {
    body.innerHTML = '<div class="portfolio-empty">No positions yet — place a trade to get started.</div>';
    return;
  }

  body.innerHTML = positions.map(p => `
    <div class="position-row">
      <div class="position-left">
        <div class="position-event">${p.event_title}</div>
        <div class="position-meta">
          <span class="pill ${p.outcome === 'YES' ? 'pill-yes' : 'pill-no'}">${p.outcome}</span>
          ${p.contracts} contracts · ${p.contract_label} · ${p.filled_at}
        </div>
      </div>
      <div class="position-right">
        <div class="position-payout">↑ $${p.potential_payout}</div>
        <div class="position-cost">cost $${p.cost}</div>
      </div>
    </div>
  `).join('');
}

// ── helpers ──────────────────────────────────────────────────────────────────
function appendMsg(cls, html) {
  const isBot = cls === 'bot';
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.innerHTML = `
    <div class="avatar">${isBot ? 'GP' : 'You'}</div>
    <div class="bubble">${html}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function appendBot(text)  { return appendMsg('bot',  text); }
function appendUser(text) { return appendMsg('user', text); }

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar">GP</div>
    <div class="bubble">
      <div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setLoading(on) {
  sendBtn.disabled = on;
  input.disabled   = on;
}

// ── send message ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  appendUser(text);
  setLoading(true);
  showTyping();

  try {
    const res  = await fetch('/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    hideTyping();

    if (!data.ok) {
      appendBot(`Sorry, I couldn't find a matching market for that. Try rephrasing — e.g. "I think X wins Y, bet $10".`);
      setLoading(false);
      return;
    }

    pendingDetails = data.details;
    showTradeCard(data.details);

  } catch(e) {
    hideTyping();
    appendBot('Having trouble connecting right now. Make sure the server is running and try again.');
    setLoading(false);
  }
}

// ── trade card ───────────────────────────────────────────────────────────────
function showTradeCard(d) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="avatar">GP</div>
    <div class="bubble">
      Found a match. Here's your trade summary:
      <div class="trade-card">
        <div class="card-title">── Trade Confirmation ──</div>
        <div class="trade-row"><span class="label">Event</span>     <span class="value">${d.event_title}</span></div>
        <div class="trade-row"><span class="label">Contract</span>  <span class="value">${d.contract_label.toUpperCase()}</span></div>
        <div class="trade-row"><span class="label">Side</span>      <span class="value blue">${d.outcome.toUpperCase()}</span></div>
        <div class="trade-row"><span class="label">Ask Price</span> <span class="value">$${d.ask_price} (${d.implied_probability}% implied)</span></div>
        <div class="trade-row"><span class="label">Contracts</span> <span class="value">${d.contracts}</span></div>
        <div class="trade-row"><span class="label">Cost</span>      <span class="value">$${d.actual_cost}</span></div>
        <div class="trade-row"><span class="label">Payout</span>    <span class="value green">$${d.potential_payout} (+$${d.potential_profit} profit)</span></div>
        <div class="card-actions">
          <button class="btn btn-confirm" onclick="confirmTrade()">✓ Confirm</button>
          <button class="btn btn-cancel"  onclick="cancelTrade()">✕ Cancel</button>
        </div>
      </div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ── confirm / cancel ─────────────────────────────────────────────────────────
async function confirmTrade() {
  if (!pendingDetails) return;

  // disable buttons immediately
  document.querySelectorAll('.btn').forEach(b => b.disabled = true);
  showTyping();

  try {
    const res  = await fetch('/api/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pendingDetails)
    });
    const data = await res.json();
    hideTyping();

    if (data.ok) {
      appendBot(`✓ Order filled! <strong>${pendingDetails.contracts} contracts</strong> of <strong>${pendingDetails.contract_label}</strong> @ $${pendingDetails.ask_price}. Good luck!`);
      fetchPortfolio();
    } else {
      appendBot(`Something went wrong placing your order. Please try again.`);
    }
  } catch(e) {
    hideTyping();
    appendBot('Having trouble connecting right now. Make sure the server is running and try again.');
  }

  pendingDetails = null;
  setLoading(false);
}

function cancelTrade() {
  document.querySelectorAll('.btn').forEach(b => b.disabled = true);
  appendBot("Trade cancelled. What else would you like to bet on?");
  pendingDetails = null;
  setLoading(false);
}
</script>
</body>
</html>
